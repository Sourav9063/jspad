<body class="flex flex-col md:flex-row h-screen bg-black overflow-hidden">
  <div id="editor-panel" class="flex flex-col">
    <div class="flex items-center justify-between px-3 h-[30px] bg-black border-b border-zinc-800">
      <span class="text-white font-mono font-semibold tracking-tight text-sm">JS<span
          class="text-sky-400">Pad</span></span>
      <div class="flex items-center gap-3">
        <button id="format-btn" title="Format code (Shift+Alt+F)"
          class="px-2.5 py-0.5 text-xs font-mono bg-sky-700 hover:bg-sky-600 text-white rounded cursor-pointer">
          Format
        </button>
        <span class="text-xs text-zinc-500 font-mono">Shift+Alt+F</span>
        <button id="ts-toggle-btn" title="Toggle TypeScript mode"
          class="px-1.5 py-0.5 text-xs font-mono rounded cursor-pointer transition-colors text-zinc-500 hover:text-white border border-zinc-700 hover:border-zinc-500">
          TS
        </button>
        <button id="vim-toggle-btn" title="Toggle Vim mode"
          class="px-1.5 py-0.5 text-xs font-mono rounded cursor-pointer transition-colors text-zinc-500 hover:text-white border border-zinc-700 hover:border-zinc-500">
          VIM
        </button>
        <button id="copy-editor-btn" title="Copy code"
          class="text-zinc-400 hover:text-white cursor-pointer transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>

        </button>

    </div>
    <div class="relative flex-1">
      <div id="container" class="absolute inset-0"></div>
      <div id="vim-statusbar"
        class="hidden absolute bottom-0 left-0 right-0 h-[22px] px-3 bg-black border-t border-zinc-800 font-mono text-xs text-zinc-400 flex items-center pointer-events-none">

  <div id="divider"
    class="relative h-3 w-full md:h-full md:w-1 bg-zinc-800 hover:bg-sky-600 cursor-row-resize md:cursor-col-resize transition-colors flex-shrink-0 flex items-center justify-center">

        <button id="copy-output-btn" title="Copy output"
          class="text-zinc-400 hover:text-white cursor-pointer transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>

      Output will appear here...

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script>
    require.config({
      paths: {
        vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
      },
    });

    require([ "vs/editor/editor.main" ], function () {
      monaco.editor.defineTheme("pitch-black", {
        base: "vs-dark",
        inherit: true,
        rules: [],
        colors: {
          "editor.background": "#000000",
          "editor.lineHighlightBackground": "#111111",
          "editorLineNumber.foreground": "#444444",
          "editorGutter.background": "#000000",
          "minimap.background": "#000000",
        },
      });

      const STORAGE_KEY = "jspad_code";
      const STORAGE_TS_KEY = "jspad_ts_code";

      const defaultTsCode = `// === Types & Interfaces ===
interface User {
  name: string;
  age: number;
  role?: "admin" | "viewer";
}

function greet(user: User): string {
  return \`Hello, \${user.name} (\${user.role ?? "viewer"})\`;
}

const alice: User = { name: "Alice", age: 30, role: "admin" };
console.log(greet(alice));

// === Generics ===
function first<T>(arr: T[]): T | undefined {
  return arr[0];
}

console.log(first([10, 20, 30]));
console.log(first(["a", "b", "c"]));

// === Enums ===
enum Direction {
  Up = "UP",
  Down = "DOWN",
  Left = "LEFT",
  Right = "RIGHT",
}

console.log(Direction.Up);

// === Type narrowing ===
function format(val: string | number): string {
  if (typeof val === "number") return val.toFixed(2);
  return val.toUpperCase();
}

console.log(format(3.14159));
console.log(format("hello"));

// === Async / Promise ===
async function fetchUser(id: number): Promise<User> {
  return { name: \`User_\${id}\`, age: 20 + id };
}

fetchUser(1).then((u) => console.log("fetched:", u));`;

      const savedCode = localStorage.getItem(STORAGE_KEY);

      const defaultCode = `// === Primitives ===
console.log("string");
console.log(42);
console.log(3.14);
console.log(true);
console.log(false);
console.log(null);
console.log(undefined);
console.log(NaN);
console.log(Infinity);
console.log(-Infinity);

// === Multiple args ===
console.log("a", "b", "c");
console.log(1, 2, 3);
console.log("mixed", 42, true, null);

// === Objects & Arrays ===
console.log({ name: "Alice", age: 30 });
console.log([1, 2, 3]);
console.log([{ id: 1 }, { id: 2 }]);
console.log({ nested: { deep: { value: 99 } } });
console.log({ arr: [1, [2, [3]]] });

// === Warnings ===
console.warn("simple warning");
console.warn("deprecated API usage");
console.warn("something might be wrong", { code: 42 });

// === Errors ===
console.error("simple error");
console.error("failed to fetch", { status: 404 });
console.error(new Error("something broke"));
console.error("multiple", "error", "args");

// === Long output ===
console.log("a".repeat(200));
console.log(Array.from({ length: 20 }, (_, i) => i));

// === Async (fetch simulation) ===
Promise.resolve({ user: "Bob", score: 100 }).then((val) =>
  console.log("async resolved:", val)
);

Promise.reject(new Error("async failure")).catch((err) =>
  console.error("async rejected:", err)
);

setTimeout(() => console.log("setTimeout fired after 500ms"), 500);
setTimeout(() => console.warn("setTimeout warning after 1s"), 1000);
setTimeout(() => console.error("setTimeout error after 1.5s"), 1500);

// === Thrown error (caught by editor) ===
// Uncomment to test runtime error display:
// throw new Error("uncaught runtime error");`;

      const editor = monaco.editor.create(
        document.getElementById("container"),
        {
          value: savedCode || defaultCode,
          language: "javascript",
          theme: "pitch-black",
          automaticLayout: true,
          fontSize: 16,
          formatOnPaste: true,
          minimap: {
            renderCharacters: false,
            maxColumn: 24,
            size: "fit",
          },
        },
      );

      const outputDiv = document.getElementById("output");

      const VIM_KEY = "jspad_vim";
      const vimBtn = document.getElementById("vim-toggle-btn");
      const vimStatusbar = document.getElementById("vim-statusbar");
      let vimMode = null;
      let MonacoVim = null;

      function setVimActive(active) {
        if (!MonacoVim) return;
        if (active) {
          vimMode = MonacoVim.initVimMode(editor, vimStatusbar);
          editor.updateOptions({ lineNumbers: "relative" });
          vimStatusbar.classList.remove("hidden");
          vimBtn.classList.remove("text-zinc-500", "border-zinc-700");
          vimBtn.classList.add("text-sky-400", "border-sky-600");
        } else {
          if (vimMode) { vimMode.dispose(); vimMode = null; }
          editor.updateOptions({ lineNumbers: "on" });
          vimStatusbar.classList.add("hidden");
          vimBtn.classList.add("text-zinc-500", "border-zinc-700");
          vimBtn.classList.remove("text-sky-400", "border-sky-600");
        }
        localStorage.setItem(VIM_KEY, active ? "1" : "0");
      }

      vimBtn.addEventListener("click", () => setVimActive(!vimMode));

      const TS_KEY = "jspad_ts";
      const tsBtn = document.getElementById("ts-toggle-btn");
      let tsActive = false;
      let tsLoaded = false;
      let tsLoading = false;

      function applyTsMode(active) {
        // Save current content to the outgoing mode's key
        if (active) {
          localStorage.setItem(STORAGE_KEY, editor.getValue());
        } else {
          localStorage.setItem(STORAGE_TS_KEY, editor.getValue());
        }

        tsActive = active;
        const model = editor.getModel();
        monaco.editor.setModelLanguage(model, active ? "typescript" : "javascript");

        // Load saved content for the new mode, or fall back to default
        const saved = active
          ? localStorage.getItem(STORAGE_TS_KEY)
          : localStorage.getItem(STORAGE_KEY);
        editor.setValue(saved || (active ? defaultTsCode : defaultCode));

        if (active) {
          tsBtn.classList.remove("text-zinc-500", "border-zinc-700");
          tsBtn.classList.add("text-sky-400", "border-sky-600");
        } else {
          tsBtn.classList.add("text-zinc-500", "border-zinc-700");
          tsBtn.classList.remove("text-sky-400", "border-sky-600");
        }
        localStorage.setItem(TS_KEY, active ? "1" : "0");
        runCode(editor.getValue());
      }

      function loadTypeScript(cb) {
        if (tsLoaded) return cb();
        if (tsLoading) return;
        tsLoading = true;
        tsBtn.textContent = "...";
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/typescript/lib/typescript.js";
        s.onload = () => { tsLoaded = true; tsBtn.textContent = "TS"; cb(); };
        document.head.appendChild(s);
      }

      tsBtn.addEventListener("click", () => {
        if (tsActive) { applyTsMode(false); return; }
        loadTypeScript(() => applyTsMode(true));
      });

      if (localStorage.getItem(TS_KEY) === "1") {
        loadTypeScript(() => applyTsMode(true));
      }

      const savedDefine = window.define;
      window.define = function () { return savedDefine.apply(this, arguments); };
      const vimScript = document.createElement("script");
      vimScript.src = "https://cdn.jsdelivr.net/npm/monaco-vim@0.4.4/dist/monaco-vim.umd.js";
      vimScript.onload = function () {
        window.define = savedDefine;
        MonacoVim = window.MonacoVim;
        if (localStorage.getItem(VIM_KEY) === "1") setVimActive(true);
      };
      document.head.appendChild(vimScript);

      document.getElementById("format-btn").addEventListener("click", () => {
        editor.getAction("editor.action.formatDocument").run();
      });

      function flashCopied(btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        btn.classList.add("text-green-400");
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.classList.remove("text-green-400");
        }, 1500);
      }

      document
        .getElementById("copy-editor-btn")
        .addEventListener("click", () => {
          navigator.clipboard
            .writeText(editor.getValue())
            .then(() =>
              flashCopied(document.getElementById("copy-editor-btn")),
            );
        });

      document
        .getElementById("copy-output-btn")
        .addEventListener("click", () => {
          navigator.clipboard
            .writeText(outputDiv.innerText)
            .then(() =>
              flashCopied(document.getElementById("copy-output-btn")),
            );
        });

      function runCode(code) {
        outputDiv.innerHTML = "";

        function appendLine(text, colorClass) {
          if (outputDiv.firstChild) {
            const hr = document.createElement("hr");
            hr.className = "border-zinc-800 my-1";
            outputDiv.appendChild(hr);
          }
          const span = document.createElement("span");
          span.className = colorClass;
          span.textContent = text;
          outputDiv.appendChild(span);
        }

        function stringify(a) {
          if (a instanceof Error) return a.message;
          if (typeof a === "object" && a !== null)
            return JSON.stringify(a, null, 2);
          return String(a);
        }

        const customConsole = {
          log: (...args) =>
            appendLine(args.map(stringify).join(" "), "text-sky-300"),
          error: (...args) =>
            appendLine(
              "[error] " + args.map(stringify).join(" "),
              "text-red-400",
            ),
          warn: (...args) =>
            appendLine(
              "[warn] " + args.map(stringify).join(" "),
              "text-yellow-400",
            ),
        };

        try {
          const runnable = tsActive && tsLoaded
            ? ts.transpileModule(code, { compilerOptions: { target: ts.ScriptTarget.ES2020 } }).outputText
            : code;
          new Function("console", runnable)(customConsole);
        } catch (err) {
          appendLine(err.message, "text-red-400");
        }
      }

      editor.onDidChangeModelContent(() => {
        const code = editor.getValue();
        localStorage.setItem(tsActive ? STORAGE_TS_KEY : STORAGE_KEY, code);
        runCode(code);
      });

      runCode(editor.getValue());
    });

    // Divider drag to resize
    const divider = document.getElementById("divider");
    const editorPanel = document.getElementById("editor-panel");

    function isMobile() { return window.innerWidth < 768; }

    function setInitialSize() {
      if (isMobile()) {
        editorPanel.style.width = "";
        editorPanel.style.height = "50%";
      } else {
        editorPanel.style.height = "";
        editorPanel.style.width = "60%";
      }
    }

    setInitialSize();
    window.addEventListener("resize", setInitialSize);

    function startDrag(getClientPos) {
      const mobile = isMobile();
      document.body.style.cursor = mobile ? "row-resize" : "col-resize";
      document.body.style.userSelect = "none";

      function onMove(e) {
        const pos = getClientPos(e);
        if (mobile) {
          const newHeight = Math.min(Math.max(pos.y, 100), document.body.clientHeight - 100);
          editorPanel.style.height = newHeight + "px";
        } else {
          const newWidth = Math.min(Math.max(pos.x, 150), document.body.clientWidth - 150);
          editorPanel.style.width = newWidth + "px";
        }
      }

      function onUp() {
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        document.removeEventListener("touchmove", onMove);
        document.removeEventListener("touchend", onUp);
      }

      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
      document.addEventListener("touchmove", onMove, { passive: false });
      document.addEventListener("touchend", onUp);
    }

    divider.addEventListener("mousedown", (e) => {
      e.preventDefault();
      startDrag((e) => ({ x: e.clientX, y: e.clientY }));
    });

    divider.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startDrag((e) => ({ x: e.touches[ 0 ].clientX, y: e.touches[ 0 ].clientY }));
    }, { passive: false });
  </script>
