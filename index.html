<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Pad — Online JavaScript Playground & Scratchpad</title>
    <meta
      name="description"
      content="JS Pad is a free, instant online JavaScript playground and scratchpad. Write, run, and debug JS code in your browser — no setup, no install required."
    />
    <meta
      name="keywords"
      content="js pad, jspad, javascript playground, online javascript editor, js scratchpad, javascript scratchpad, run javascript online, browser javascript editor, js repl, javascript repl, code sandbox, online code editor"
    />
    <meta name="author" content="Sourav" />
    <link rel="canonical" href="https://sourav9063.github.io/jspad" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sourav9063.github.io/jspad" />
    <meta
      property="og:title"
      content="JS Pad — Online JavaScript Playground & Scratchpad"
    />
    <meta
      property="og:description"
      content="Free, instant online JavaScript playground. Write and run JS code in your browser — no setup, no install required."
    />
    <meta property="og:site_name" content="JS Pad" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="JS Pad — Online JavaScript Playground & Scratchpad"
    />
    <meta
      name="twitter:description"
      content="Free, instant online JavaScript playground. Write and run JS code in your browser — no setup required."
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "JS Pad",
        "url": "https://sourav9063.github.io/jspad",
        "description": "Free online JavaScript playground and scratchpad. Write, run, and debug JavaScript code instantly in your browser.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body class="flex h-screen bg-black overflow-hidden">
    <div id="editor-panel" class="h-full flex flex-col" style="width:60%">
      <div class="flex items-center justify-end px-3 h-[30px] bg-black border-b border-zinc-800">
        <button id="copy-editor-btn" title="Copy code" class="text-zinc-400 hover:text-white cursor-pointer transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>
        </button>
      </div>
      <div id="container" class="flex-1"></div>
    </div>

    <div id="divider" class="w-1 h-full bg-zinc-800 hover:bg-sky-600 cursor-col-resize transition-colors flex-shrink-0"></div>

    <div id="output-panel" class="flex flex-col overflow-hidden" style="flex:1">
      <div
        class="flex items-center gap-2 px-3 h-[30px] bg-black border-b border-zinc-800"
      >
        <button
          id="format-btn"
          class="px-2.5 py-0.5 text-xs font-mono bg-sky-700 hover:bg-sky-600 text-white rounded cursor-pointer"
        >
          Format
        </button>
        <span class="text-xs text-zinc-500 font-mono">Shift+Alt+F</span>
        <div class="ml-auto">
          <button id="copy-output-btn" title="Copy output" class="text-zinc-400 hover:text-white cursor-pointer transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>
          </button>
        </div>
      </div>
      <div
        id="output"
        class="flex-1 font-mono text-sm p-5 overflow-auto whitespace-pre-wrap text-sky-300"
      >
        Output will appear here...
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });

      require(["vs/editor/editor.main"], function () {
        monaco.editor.defineTheme("pitch-black", {
          base: "vs-dark",
          inherit: true,
          rules: [],
          colors: {
            "editor.background": "#000000",
            "editor.lineHighlightBackground": "#111111",
            "editorLineNumber.foreground": "#444444",
            "editorGutter.background": "#000000",
            "minimap.background": "#000000",
          },
        });

        const editor = monaco.editor.create(
          document.getElementById("container"),
          {
            value: `// === Primitives ===
console.log("string");
console.log(42);
console.log(3.14);
console.log(true);
console.log(false);
console.log(null);
console.log(undefined);
console.log(NaN);
console.log(Infinity);
console.log(-Infinity);

// === Multiple args ===
console.log("a", "b", "c");
console.log(1, 2, 3);
console.log("mixed", 42, true, null);

// === Objects & Arrays ===
console.log({ name: "Alice", age: 30 });
console.log([1, 2, 3]);
console.log([{ id: 1 }, { id: 2 }]);
console.log({ nested: { deep: { value: 99 } } });
console.log({ arr: [1, [2, [3]]] });

// === Warnings ===
console.warn("simple warning");
console.warn("deprecated API usage");
console.warn("something might be wrong", { code: 42 });

// === Errors ===
console.error("simple error");
console.error("failed to fetch", { status: 404 });
console.error(new Error("something broke"));
console.error("multiple", "error", "args");

// === Long output ===
console.log("a".repeat(200));
console.log(Array.from({ length: 20 }, (_, i) => i));

// === Async (fetch simulation) ===
Promise.resolve({ user: "Bob", score: 100 }).then((val) =>
  console.log("async resolved:", val)
);

Promise.reject(new Error("async failure")).catch((err) =>
  console.error("async rejected:", err)
);

setTimeout(() => console.log("setTimeout fired after 500ms"), 500);
setTimeout(() => console.warn("setTimeout warning after 1s"), 1000);
setTimeout(() => console.error("setTimeout error after 1.5s"), 1500);

// === Thrown error (caught by editor) ===
// Uncomment to test runtime error display:
// throw new Error("uncaught runtime error");`,
            language: "javascript",
            theme: "pitch-black",
            automaticLayout: true,
            fontSize: 16,
            formatOnPaste: true,
          },
        );

        const outputDiv = document.getElementById("output");

        document.getElementById("format-btn").addEventListener("click", () => {
          editor.getAction("editor.action.formatDocument").run();
        });

        function flashCopied(btn) {
          const orig = btn.innerHTML;
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
          btn.classList.add("text-green-400");
          setTimeout(() => { btn.innerHTML = orig; btn.classList.remove("text-green-400"); }, 1500);
        }

        document.getElementById("copy-editor-btn").addEventListener("click", () => {
          navigator.clipboard.writeText(editor.getValue()).then(() =>
            flashCopied(document.getElementById("copy-editor-btn"))
          );
        });

        document.getElementById("copy-output-btn").addEventListener("click", () => {
          navigator.clipboard.writeText(outputDiv.innerText).then(() =>
            flashCopied(document.getElementById("copy-output-btn"))
          );
        });

        function runCode(code) {
          outputDiv.innerHTML = "";

          function appendLine(text, colorClass) {
            if (outputDiv.firstChild) {
              const hr = document.createElement("hr");
              hr.className = "border-zinc-800 my-1";
              outputDiv.appendChild(hr);
            }
            const span = document.createElement("span");
            span.className = colorClass;
            span.textContent = text;
            outputDiv.appendChild(span);
          }

          function stringify(a) {
            if (a instanceof Error) return a.message;
            if (typeof a === "object" && a !== null)
              return JSON.stringify(a, null, 2);
            return String(a);
          }

          const customConsole = {
            log: (...args) =>
              appendLine(args.map(stringify).join(" "), "text-sky-300"),
            error: (...args) =>
              appendLine(
                "[error] " + args.map(stringify).join(" "),
                "text-red-400",
              ),
            warn: (...args) =>
              appendLine(
                "[warn] " + args.map(stringify).join(" "),
                "text-yellow-400",
              ),
          };

          try {
            new Function("console", code)(customConsole);
          } catch (err) {
            appendLine(err.message, "text-red-400");
          }
        }

        editor.onDidChangeModelContent(() => {
          runCode(editor.getValue());
        });

        runCode(editor.getValue());
      });

      // Divider drag to resize
      const divider = document.getElementById("divider");
      const editorPanel = document.getElementById("editor-panel");

      divider.addEventListener("mousedown", (e) => {
        e.preventDefault();
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";

        function onMouseMove(e) {
          const totalWidth = document.body.clientWidth;
          const newWidth = Math.min(Math.max(e.clientX, 150), totalWidth - 150);
          editorPanel.style.width = newWidth + "px";
        }

        function onMouseUp() {
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
          document.removeEventListener("mousemove", onMouseMove);
          document.removeEventListener("mouseup", onMouseUp);
        }

        document.addEventListener("mousemove", onMouseMove);
        document.addEventListener("mouseup", onMouseUp);
      });
    </script>
  </body>
</html>
