<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="JS Pad is a free, instant online JavaScript playground and scratchpad. Write, run, and debug JS code in your browser — no setup, no install required." />

    <link rel="canonical" href="https://sourav9063.github.io/jspad" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sourav9063.github.io/jspad" />
    <meta property="og:title" content="JS Pad — Online JavaScript Playground & Scratchpad" />
    <meta property="og:description" content="Free, instant online JavaScript playground. Write and run JS code in your browser — no setup, no install required." />
    <meta property="og:site_name" content="JS Pad" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JS Pad — Online JavaScript Playground & Scratchpad" />
    <meta name="twitter:description" content="Free, instant online JavaScript playground. Write and run JS code in your browser — no setup required." />

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "JS Pad",
      "url": "https://sourav9063.github.io/jspad",
      "description": "Free online JavaScript playground and scratchpad. Write, run, and debug JavaScript code instantly in your browser.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body class="flex h-screen bg-zinc-900 overflow-hidden">
    <div id="container" class="w-3/5 h-full border-r border-zinc-700"></div>
    <div class="w-2/5 flex flex-col overflow-hidden">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-zinc-800 border-b border-zinc-700">
        <button id="format-btn" class="px-2.5 py-0.5 text-xs font-mono bg-sky-700 hover:bg-sky-600 text-white rounded cursor-pointer">
          Format
        </button>
        <span class="text-xs text-zinc-500 font-mono">Shift+Alt+F</span>
      </div>
      <div id="output" class="flex-1 text-sky-300 font-mono text-sm p-5 overflow-auto whitespace-pre-wrap">
        Output will appear here...
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });

      require(["vs/editor/editor.main"], function () {
        const editor = monaco.editor.create(
          document.getElementById("container"),
          {
            value:
              "console.log('Hello World!');\n\nfunction add(a, b) {\n  return a + b;\n}",
            language: "javascript",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 16,
            formatOnPaste: true,
          },
        );

        const outputDiv = document.getElementById("output");

        document.getElementById("format-btn").addEventListener("click", () => {
          editor.getAction("editor.action.formatDocument").run();
        });

        function runCode(code) {
          try {
            let logs = [];
            const customConsole = {
              log: (...args) =>
                logs.push(
                  args
                    .map((a) =>
                      typeof a === "object" ? JSON.stringify(a, null, 2) : String(a)
                    )
                    .join(" ")
                ),
              error: (...args) => logs.push("[error] " + args.join(" ")),
              warn: (...args) => logs.push("[warn] " + args.join(" ")),
            };
            new Function("console", code)(customConsole);
            outputDiv.textContent = logs.length ? logs.join("\n") : "";
            outputDiv.className = outputDiv.className.replace(/text-\S+/, "text-sky-300");
          } catch (err) {
            outputDiv.className = outputDiv.className.replace(/text-\S+/, "text-red-400");
            outputDiv.textContent = err.message;
          }
        }

        editor.onDidChangeModelContent(() => {
          runCode(editor.getValue());
        });

        runCode(editor.getValue());
      });
    </script>
  </body>
</html>
