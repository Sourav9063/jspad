<body class="flex h-screen bg-black overflow-hidden">

      <div class="flex items-center gap-3">

          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor">

              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />

        class="hidden absolute bottom-0 left-0 right-0 h-[22px] px-3 bg-black border-t border-zinc-800 font-mono text-xs text-zinc-400 flex items-center pointer-events-none">

  <div id="output-panel" class="flex flex-col overflow-hidden" style="flex: 1">
    <div class="flex items-center gap-2 px-3 h-[30px] bg-black border-b border-zinc-800">
      <button id="format-btn"
        class="px-2.5 py-0.5 text-xs font-mono bg-sky-700 hover:bg-sky-600 text-white rounded cursor-pointer">
        Format
      </button>
      <span class="text-xs text-zinc-500 font-mono">Shift+Alt+F</span>
      <div class="ml-auto">
        <button id="copy-output-btn" title="Copy output"
          class="text-zinc-400 hover:text-white cursor-pointer transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          </svg>
        </button>
      </div>
    </div>
    <div id="output" class="flex-1 font-mono text-sm p-5 overflow-auto whitespace-pre-wrap text-sky-300">
      Output will appear here...
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script>
    require.config({
      paths: {
        vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
      },
    });

    require([ "vs/editor/editor.main" ], function () {
      monaco.editor.defineTheme("pitch-black", {
        base: "vs-dark",
        inherit: true,
        rules: [],
        colors: {
          "editor.background": "#000000",
          "editor.lineHighlightBackground": "#111111",
          "editorLineNumber.foreground": "#444444",
          "editorGutter.background": "#000000",
          "minimap.background": "#000000",
        },
      });

      const STORAGE_KEY = "jspad_code";

      const savedCode = localStorage.getItem(STORAGE_KEY);

      const defaultCode = `// === Primitives ===
console.log("string");
console.log(42);
console.log(3.14);
console.log(true);
console.log(false);
console.log(null);
console.log(undefined);
console.log(NaN);
console.log(Infinity);
console.log(-Infinity);

// === Multiple args ===
console.log("a", "b", "c");
console.log(1, 2, 3);
console.log("mixed", 42, true, null);

// === Objects & Arrays ===
console.log({ name: "Alice", age: 30 });
console.log([1, 2, 3]);
console.log([{ id: 1 }, { id: 2 }]);
console.log({ nested: { deep: { value: 99 } } });
console.log({ arr: [1, [2, [3]]] });

// === Warnings ===
console.warn("simple warning");
console.warn("deprecated API usage");
console.warn("something might be wrong", { code: 42 });

// === Errors ===
console.error("simple error");
console.error("failed to fetch", { status: 404 });
console.error(new Error("something broke"));
console.error("multiple", "error", "args");

// === Long output ===
console.log("a".repeat(200));
console.log(Array.from({ length: 20 }, (_, i) => i));

// === Async (fetch simulation) ===
Promise.resolve({ user: "Bob", score: 100 }).then((val) =>
  console.log("async resolved:", val)
);

Promise.reject(new Error("async failure")).catch((err) =>
  console.error("async rejected:", err)
);

setTimeout(() => console.log("setTimeout fired after 500ms"), 500);
setTimeout(() => console.warn("setTimeout warning after 1s"), 1000);
setTimeout(() => console.error("setTimeout error after 1.5s"), 1500);

// === Thrown error (caught by editor) ===
// Uncomment to test runtime error display:
// throw new Error("uncaught runtime error");`;

      const editor = monaco.editor.create(
        document.getElementById("container"),
        {
          value: savedCode ?? defaultCode,
          language: "javascript",
          theme: "pitch-black",
          automaticLayout: true,
          fontSize: 16,
          formatOnPaste: true,
          minimap: {
            renderCharacters: false,
            maxColumn: 24,
            size: "fit",
          },
        },
      );

      const outputDiv = document.getElementById("output");

      const VIM_KEY = "jspad_vim";
      const vimBtn = document.getElementById("vim-toggle-btn");
      const vimStatusbar = document.getElementById("vim-statusbar");
      let vimMode = null;
      let MonacoVim = null;

      function setVimActive(active) {
        if (!MonacoVim) return;
        if (active) {
          vimMode = MonacoVim.initVimMode(editor, vimStatusbar);
          editor.updateOptions({ lineNumbers: "relative" });
          vimStatusbar.classList.remove("hidden");
          vimBtn.classList.remove("text-zinc-500", "border-zinc-700");
          vimBtn.classList.add("text-sky-400", "border-sky-600");
        } else {
          if (vimMode) { vimMode.dispose(); vimMode = null; }
          editor.updateOptions({ lineNumbers: "on" });
          vimStatusbar.classList.add("hidden");
          vimBtn.classList.add("text-zinc-500", "border-zinc-700");
          vimBtn.classList.remove("text-sky-400", "border-sky-600");
        }
        localStorage.setItem(VIM_KEY, active ? "1" : "0");
      }

      vimBtn.addEventListener("click", () => setVimActive(!vimMode));

      const savedDefine = window.define;
      window.define = function () { return savedDefine.apply(this, arguments); };
      const vimScript = document.createElement("script");
      vimScript.src = "https://cdn.jsdelivr.net/npm/monaco-vim@0.4.4/dist/monaco-vim.umd.js";
      vimScript.onload = function () {
        window.define = savedDefine;
        MonacoVim = window.MonacoVim;
        if (localStorage.getItem(VIM_KEY) === "1") setVimActive(true);
      };
      document.head.appendChild(vimScript);

      document.getElementById("format-btn").addEventListener("click", () => {
        editor.getAction("editor.action.formatDocument").run();
      });

      function flashCopied(btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        btn.classList.add("text-green-400");
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.classList.remove("text-green-400");
        }, 1500);
      }

      document
        .getElementById("copy-editor-btn")
        .addEventListener("click", () => {
          navigator.clipboard
            .writeText(editor.getValue())
            .then(() =>
              flashCopied(document.getElementById("copy-editor-btn")),
            );
        });

      document
        .getElementById("copy-output-btn")
        .addEventListener("click", () => {
          navigator.clipboard
            .writeText(outputDiv.innerText)
            .then(() =>
              flashCopied(document.getElementById("copy-output-btn")),
            );
        });

      function runCode(code) {
        outputDiv.innerHTML = "";

        function appendLine(text, colorClass) {
          if (outputDiv.firstChild) {
            const hr = document.createElement("hr");
            hr.className = "border-zinc-800 my-1";
            outputDiv.appendChild(hr);
          }
          const span = document.createElement("span");
          span.className = colorClass;
          span.textContent = text;
          outputDiv.appendChild(span);
        }

        function stringify(a) {
          if (a instanceof Error) return a.message;
          if (typeof a === "object" && a !== null)
            return JSON.stringify(a, null, 2);
          return String(a);
        }

        const customConsole = {
          log: (...args) =>
            appendLine(args.map(stringify).join(" "), "text-sky-300"),
          error: (...args) =>
            appendLine(
              "[error] " + args.map(stringify).join(" "),
              "text-red-400",
            ),
          warn: (...args) =>
            appendLine(
              "[warn] " + args.map(stringify).join(" "),
              "text-yellow-400",
            ),
        };

        try {
          new Function("console", code)(customConsole);
        } catch (err) {
          appendLine(err.message, "text-red-400");
        }
      }

      editor.onDidChangeModelContent(() => {
        const code = editor.getValue();
        localStorage.setItem(STORAGE_KEY, code);
        runCode(code);
      });

      runCode(editor.getValue());
    });

    // Divider drag to resize
    const divider = document.getElementById("divider");
    const editorPanel = document.getElementById("editor-panel");

    divider.addEventListener("mousedown", (e) => {
      e.preventDefault();
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";

      function onMouseMove(e) {
        const totalWidth = document.body.clientWidth;
        const newWidth = Math.min(Math.max(e.clientX, 150), totalWidth - 150);
        editorPanel.style.width = newWidth + "px";
      }

      function onMouseUp() {
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);
      }

      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    });
  </script>
