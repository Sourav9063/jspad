    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "JS Pad",
      "url": "https://sourav9063.github.io/jspad",
      "description": "Free online JavaScript playground and scratchpad. Write, run, and debug JavaScript code instantly in your browser.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
    <style>
      body {
        margin: 0;
        display: flex;
        height: 100vh;
      }
      #container {
        width: 60%;
        height: 100%;
        border-right: 1px solid #333;
      }
      #output {
        width: 40%;
        background: #1e1e1e;
        color: #75beff;
        padding: 20px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="output">Output will appear here...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
      require.config({
        paths: {
          vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs",
        },
      });

      require(["vs/editor/editor.main"], function () {
        // Initialize the editor
        const editor = monaco.editor.create(
          document.getElementById("container"),
          {
            value:
              "console.log('Hello World!');\n\nfunction add(a, b) {\n  return a + b;\n}",
            language: "javascript",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 16,
          },
        );

        const outputDiv = document.getElementById("output");

        // Run code on every change
        editor.onDidChangeModelContent(() => {
          try {
            const code = editor.getValue();
            let logs = [];
            const customConsole = {
              log: (...args) => logs.push(args.join(" ")),
            };

            new Function("console", code)(customConsole);
            outputDiv.textContent = logs.join("\n");
            outputDiv.style.color = "#75beff";
          } catch (err) {
            outputDiv.style.color = "#ff5555";
            outputDiv.textContent = err.message;
          }
        });
      });
    </script>
  </body>
